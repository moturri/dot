##### Reload Config #####
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

##### Mouse, History, Navigation #####
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

##### Terminal & Color Support #####
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"

##### Prefix (Default C-b) #####
# Uncomment below to use Ctrl-a instead
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

##### Pane Navigation (Alt + hjkl) #####
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

##### Window Splitting with Current Path #####
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind '%'

##### Create Window in Current Path #####
bind c new-window -c "#{pane_current_path}"

##### Vi-style Copy Mode #####
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

##### Status Bar: Dark + Orchid Style #####
set -g status-position top
set -g status-interval 15
set -g status-justify left
set -g status-left-length 60
set -g status-right-length 100

# Base colors
set-option -g status-style "bg=colour234 fg=colour247"
set-option -g message-style "bg=colour234 fg=colour81"
set-option -g pane-border-style "fg=colour238"
set-option -g pane-active-border-style "fg=colour81"

# Session name on the left
set -g status-left "#[fg=colour81,bold]#S #[fg=colour240]|"

# Current time and user on the right
set -g status-right "#[fg=colour240]%Y-%m-%d #[fg=colour245]%H:%M #[fg=colour81]| #[fg=colour244]#(whoami)"

# Inactive window style
setw -g window-status-format " #[fg=colour245]#I:#W "

# Current window = Orchid (colour170)
setw -g window-status-current-format " #[bg=colour170,fg=colour234,bold] #I:#W #[default]"

# Remove window separators for a clean look
setw -g window-status-separator ""
