palette = 'term256_dark'

[palettes.term256_dark]
# Base Colors
text = "#cdd6f4"
surface0 = "#313244"
surface1 = "#45475a"
mantle = "#181825"
base = "#1e1e2e"

# Accent Colors (vibrant)
green = "#a6e3a1"
blue = "#89b4fa"
purple = "#cba6f7"
peach = "#fab387"
red = "#f38ba8"
yellow = "#f9e2af"
teal = "#94e2d5"
lavender = "#b4befe"

color_fg0 = "#cdd6f4"
color_bg1 = "#1e1e2e"
color_bg3 = "#313244"

[os.symbols]
Arch = "ůį£á"

[os]
disabled = false
style = "bg:surface0 fg:text"

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = '[ $user ]($style)'

[directory]
style = "fg:text bg:mantle"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
