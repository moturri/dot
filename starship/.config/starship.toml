# Starship Prompt Format
format = """
$directory\
$git_branch\
$git_status\
[ ](bg:dracula_bg)\
"""

palette = "dracula"

# Dracula Palette (Essential Colors Only)
[palettes.dracula]
text = "#f8f8f2"
dracula_bg = "#000000"
dracula_fg = "#44475a"
dracula_purple = "#bd93f9"

# Directory Module
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# Git Branch Styling
[git_branch]
symbol = ""
style = "fg:dracula_purple"
format = '[ $symbol $branch ]($style)'

# Git Status Styling
[git_status]
ignore_submodules = true
disabled = false
style = "fg:dracula_fg"
format = '[$all_status$_ahead_behind]($style)'
ahead = '⇡${count}'
behind = '⇣${count}'

# Disable all other modules
[aws]
disabled = true

[gcloud]
disabled = true

[package]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

[time]
disabled = true

[battery]
disabled = true

[cmd_duration]
disabled = true

[docker_context]
disabled = true

[python]
disabled = true

[dotnet]
disabled = true

[perl]
disabled = true

[golang]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[terraform]
disabled = true
