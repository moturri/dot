format = """
[Óā∂](dark)\
$directory\
[Óāī](fg:dark bg:deep_purple)\
$git_branch\
$git_status\
[Óāī](fg:deep_purple)\
$line_break$character"""

palette = 'base'

[palettes.base]
# Base Colors
text = "#cdd6f4"
dark = "#191919"
base = "#1e1e2e"

# Accent Colors
green = "#a6e3a1"
blue = "#89b4fa"
purple = "#cba6f7"
deep_purple = "#a58bd4"
yellow = "#f9e2af"
deep_yellow = "#e0c063"
peach = "#fab387"
red = "#f38ba8"
teal = "#94e2d5"
lavender = "#b4befe"

[directory]
style = "fg:text bg:dark"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Óā†"
style = "bg:deep_purple"
format = '[[ $symbol $branch ](fg:base bg:deep_purple)]($style)'

[git_status]
style = "fg:base bg:deep_purple"
format = '[$all_status$_ahead_behind]($style)'
ahead = '^${count}'
behind = 'v${count}'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[Ôź≤](bold fg:green)'
error_symbol = '[Ôź≤](bold fg:red)'
vimcmd_symbol = '[Ôźī](bold fg:teal)'
vimcmd_replace_one_symbol = '[Ôźī](bold fg:purple)'
vimcmd_replace_symbol = '[Ôźī](bold fg:purple)'
vimcmd_visual_symbol = '[Ôźī](bold fg:lavender)'
