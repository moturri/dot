# Starship Prompt Format
format = """$directory$git_branch$git_status"""

palette = "dracula"

# Dracula Palette (Essential Colors Only)
[palettes.dracula]
text = "#f8f8f2"
dracula_bg = "#000010"
dracula_fg = "#44475a"
dracula_purple = "#bd93f9"

# Directory Module
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

# Git Branch Styling
[git_branch]
symbol = ""
style = "bg:dracula_purple fg:dracula_bg"
format = '[ $symbol $branch ]($style)'

# Git Status Styling
[git_status]
style = "bg:dracula_purple fg:dracula_bg"
format = '[$all_status$_ahead_behind]($style)'
ahead = '⇡${count}'
behind = '⇣${count}'

# Disable all other modules
[aws]
disabled = true

[gcloud]
disabled = true

[package]
disabled = true

[username]
disabled = true

[hostname]
disabled = true

[time]
disabled = true


